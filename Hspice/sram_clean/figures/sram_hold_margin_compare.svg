<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #111827; }
    .axis { stroke: #374151; stroke-width: 1.2; }
    .grid { stroke: #e5e7eb; stroke-width: 1; }
    .no { fill: #2563eb; }
    .rc { fill: #0f766e; }
    .bad { fill: #b91c1c; }
    .title { font-size: 18px; font-weight: 700; }
    .label { font-size: 12px; }
    .note { font-size: 13px; fill: #4b5563; }
  </style>
  <text class="title" x="34" y="32">Hold-mode low-node residual and high-node retention</text>
  <text class="note" x="34" y="55">Data source: HSPICE .mt0; lower residual and smaller high-node droop are better.</text>
