  <line class="grid" x1="90" y1="170" x2="840" y2="170"/>
  <line class="grid" x1="90" y1="220" x2="840" y2="220"/>
  <line class="grid" x1="90" y1="270" x2="840" y2="270"/>
  <text class="label" x="28" y="124">5 uV</text>
  <text class="label" x="28" y="174">4 uV</text>
  <text class="label" x="28" y="224">3 uV</text>
  <text class="label" x="28" y="274">2 uV</text>
  <text class="label" x="50" y="324">0</text>
  <rect class="no" x="145" y="128.6" width="58" height="191.4"/>
  <rect class="rc" x="215" y="122.3" width="58" height="197.7"/>
  <text class="label" x="136" y="346">Hold-Q1 low residual</text>
  <text class="label" x="140" y="116">3.828 uV</text>
  <text class="label" x="210" y="110">3.955 uV</text>
  <rect class="no" x="370" y="128.6" width="58" height="191.4"/>
  <rect class="rc" x="440" y="122.4" width="58" height="197.6"/>
  <text class="label" x="360" y="346">Hold-Q0 low residual</text>
  <text class="label" x="365" y="116">3.828 uV</text>
  <text class="label" x="435" y="110">3.952 uV</text>
  <rect class="no" x="610" y="170" width="58" height="150"/>
  <rect class="rc" x="680" y="170" width="58" height="150"/>
  <text class="label" x="590" y="346">High-node droop</text>
  <text class="label" x="595" y="158">~3.0 uV</text>
  <text class="label" x="675" y="158">~3.0 uV</text>
