<svg xmlns="http://www.w3.org/2000/svg" width="760" height="330" viewBox="0 0 760 330">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #17202a; }
    .axis { stroke: #334155; stroke-width: 1.2; }
    .grid { stroke: #e2e8f0; stroke-width: 1; }
    .ideal { fill: #2563eb; }
    .rc { fill: #0f766e; }
    .title { font-size: 18px; font-weight: 700; }
    .label { font-size: 12px; }
  </style>
  <text class="title" x="34" y="30">Read-disturb comparison</text>
  <line class="axis" x1="86" y1="270" x2="700" y2="270"/>
  <line class="axis" x1="86" y1="70" x2="86" y2="270"/>
  <line class="grid" x1="86" y1="70" x2="700" y2="70"/>
  <line class="grid" x1="86" y1="120" x2="700" y2="120"/>
  <line class="grid" x1="86" y1="170" x2="700" y2="170"/>
  <line class="grid" x1="86" y1="220" x2="700" y2="220"/>
  <text class="label" x="33" y="74">0.20 V</text>
  <text class="label" x="33" y="124">0.15 V</text>
  <text class="label" x="33" y="174">0.10 V</text>
  <text class="label" x="33" y="224">0.05 V</text>
  <text class="label" x="50" y="274">0</text>
  <rect class="ideal" x="190" y="115.7" width="110" height="154.3"/>
  <text class="label" x="190" y="104">154.269 mV</text>
  <text class="label" x="176" y="294">No-RC read</text>
  <rect class="rc" x="440" y="113.7" width="110" height="156.3"/>
  <text class="label" x="440" y="102">156.253 mV</text>
  <text class="label" x="410" y="294">RC candidate read</text>
  <text class="label" x="560" y="147">+1.984 mV</text>
  <text class="label" x="560" y="165">+1.29%</text>
</svg>
